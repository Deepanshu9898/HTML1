<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=  , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
          <label for="name">Enter Your Name : </label>
          <input type="text" id="name" name="name" placeholder="Enter Your Name Here:">
          <br/>
            <br/>
            <label for="email">Enter Email ID : </label>
            <input type="text" id="email" name="email" placeholder="Enter Email Here:">
            <br/>
            <br/>
            <label for="phone number">Enter Phone Number : </label>
            <input type ="tel" id="phone number" name="phone number" placeholder="Enter Phone Number Here:">
            <br/>
            <br/>
            <label for="occupation">Select Occupation : </label>
            <select  name="occupation" id="occupation">
                <option value="Student">Student</option>
                <option value="Engineer">Engineer</option>
                <option value="Doctor">Doctor</option>
                <option value="Professional">Professional</option>
            </select>
            <br/>
            <br/>
            <fieldset>
                <legend><b>Field of Interest</b></legend>
            <label for="Web Development">Web Development : </label>
            <input type="checkbox" id="Web Development" name="Interest">
            <br/>
            <label for="Data Science">Data Science</label>
            <input type="checkbox" id="Data Science" name="Interest">
            <br/>
            <label for="Full Staack Development">Full Stack Development</label>
            <input type="checkbox" id="Full Stack Development" name="Interest">
            <br/>
            <label for="Python Developer">Python Developer</label>
            <input type="checkbox" id="Python Developer" name="Interest">
            <br/>
        </fieldset>
        <br/>
        <label for="Text Area1">Comments : </label>
        <br/>
        <textarea name="Text Area1" id="Text Area1" cols="40" rows="10"></textarea>
    </form>
</body>
</html>
